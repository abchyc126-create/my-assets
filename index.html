<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>售后管理系统 - 新增售后单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f6;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 32px 24px;
            color: #1e293b;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 卡片样式 */
        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 28px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid #eef2f6;
            background: #fafcff;
        }

        .card-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header h2:before {
            content: '';
            width: 4px;
            height: 20px;
            background: #3b82f6;
            border-radius: 4px;
            display: inline-block;
        }

        .card-body {
            padding: 24px 28px;
        }

        /* 表单布局 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px 32px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #475569;
            letter-spacing: 0.3px;
        }

        .form-field label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        input, select, textarea {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
            background: #ffffff;
            outline: none;
            color: #0f172a;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .info-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }

        .info-item {
            flex: 1;
            min-width: 140px;
        }

        .info-item .label {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 4px;
        }

        .info-item .value {
            font-weight: 600;
            color: #0f172a;
            font-size: 0.9rem;
        }

        .badge {
            background: #e6f0ff;
            color: #1e40af;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* 照片上传区域 */
        .upload-area {
            border: 1px dashed #cbd5e1;
            border-radius: 16px;
            background: #fefce8;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .upload-area:hover {
            border-color: #3b82f6;
            background: #f1f5f9;
        }

        .upload-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .file-list {
            font-size: 0.75rem;
            color: #475569;
            margin-top: 8px;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }

        button {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e6edf5;
            transform: none;
        }

        .complex-type-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .complex-type-row .form-field {
            flex: 2;
            min-width: 180px;
        }

        .inline-btn {
            background: #f1f5f9;
            color: #0f172a;
            border: 1px solid #e2e8f0;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 2px;
            cursor: pointer;
            transition: 0.2s;
        }

        .inline-btn:hover {
            background: #e2e8f0;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #ecf3f9;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 16px;
        }

        @media (max-width: 760px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .full-width {
                grid-column: span 1;
            }
            .card-body {
                padding: 18px;
            }
            .info-row {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 主标题 -->
    <div style="margin-bottom: 24px;">
        <h1 style="font-size: 1.8rem; font-weight: 700; color: #0f172a;">➕ 新增售后单</h1>
        <p style="color: #5b6e8c; margin-top: 6px;">填写设备售后信息，带*为必填项</p>
    </div>

    <form id="afterSaleForm">
        <!-- 基础信息卡片 -->
        <div class="card">
            <div class="card-header">
                <h2>基础信息</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-field">
                        <label>手机号 <span class="required">*</span></label>
                        <input type="tel" value="18565853719" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-field">
                        <label>地址</label>
                        <input type="text" value="贵州测试售后验证" placeholder="详细地址">
                    </div>
                    <div class="form-field">
                        <label>来源</label>
                        <select>
                            <option value="到店报修" selected>到店报修</option>
                            <option value="线上提单">线上提单</option>
                            <option value="电话报修">电话报修</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>售后设备ID</label>
                        <input type="text" value="SN20603244100048" readonly style="background:#f8fafc; cursor:default;">
                    </div>
                </div>
            </div>
        </div>

        <!-- 设备信息卡片（静态展示） -->
        <div class="card">
            <div class="card-header">
                <h2>📱 设备信息</h2>
            </div>
            <div class="card-body">
                <div class="info-row">
                    <div class="info-item"><div class="label">设备类型</div><div class="value">重卡锂电</div></div>
                    <div class="info-item"><div class="label">设备型号</div><div class="value">CB210-1</div></div>
                    <div class="info-item"><div class="label">质保期</div><div class="value">2028-04-21</div></div>
                    <div class="info-item"><div class="label">支持换新剩余时长</div><div class="value">723天 <span class="badge">有效</span></div></div>
                    <div class="info-item"><div class="label">保修剩余时长</div><div class="value">723天</div></div>
                </div>
            </div>
        </div>

        <!-- ========= 关键新增功能：是否安装复杂 + 动态复杂类型 ========= -->
        <div class="card" id="installComplexCard">
            <div class="card-header">
                <h2>🔧 安装配置</h2>
            </div>
            <div class="card-body">
                <div class="form-field full-width">
                    <div class="radio-group" style="margin-bottom: 12px;">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" id="isComplexInstallCheckbox" style="width: 18px; height: 18px;"> 
                            <span style="font-weight: 500;">是否安装复杂</span>
                        </label>
                        <span style="font-size: 0.75rem; color: #6c757d;">勾选后需选择复杂类型，支持动态新增配置项</span>
                    </div>
                    
                    <!-- 复杂类型下拉区域 (默认隐藏) -->
                    <div id="complexTypeContainer" style="display: none; margin-top: 12px;">
                        <div class="complex-type-row">
                            <div class="form-field" style="flex:2">
                                <label>复杂类型 <span class="required" id="complexRequiredHint">*</span></label>
                                <select id="complexTypeSelect">
                                    <option value="" disabled selected>-- 请选择复杂类型 --</option>
                                    <option value="支架复杂安装">支架复杂安装</option>
                                    <option value="线路改造级">线路改造级</option>
                                    <option value="结构加固型">结构加固型</option>
                                    <option value="高空作业复杂">高空作业复杂</option>
                                </select>
                            </div>
                            <div>
                                <button type="button" id="addComplexTypeBtn" class="inline-btn">+ 新建复杂类型</button>
                                <div style="font-size: 0.7rem; color: #5f7f9e; margin-top: 6px;">支持动态增加配置项，后续可扩展</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 故障现象 + 描述 -->
        <div class="card">
            <div class="card-header">
                <h2>⚠️ 故障信息</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label>故障现象 (可多选)</label>
                        <div class="radio-group">
                            <label><input type="checkbox" value="无法开机"> 无法开机</label>
                            <label><input type="checkbox" value="充电异常"> 充电异常</label>
                            <label><input type="checkbox" value="BMS通讯故障"> BMS通讯故障</label>
                            <label><input type="checkbox" value="C端无法发起售后"> C端无法发起售后</label>
                            <label><input type="checkbox" value="其他"> 其他</label>
                        </div>
                    </div>
                    <div class="form-field full-width">
                        <label>故障描述</label>
                        <textarea placeholder="详细描述故障现象">重卡锂电，C端无法发起售后！！！！！！！</textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 救援地点 & 地图省份选择 (简约实现) -->
        <div class="card">
            <div class="card-header">
                <h2>📍 救援地点</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-field">
                        <label>省份 / 直辖市</label>
                        <select id="provinceSelect">
                            <option value="">请选择省份</option>
                            <option value="北京市">北京市</option><option value="天津市">天津市</option><option value="河北省">河北省</option>
                            <option value="山西省">山西省</option><option value="内蒙古自治区">内蒙古自治区</option><option value="辽宁省">辽宁省</option>
                            <option value="吉林省">吉林省</option><option value="黑龙江省">黑龙江省</option><option value="上海市">上海市</option>
                            <option value="江苏省">江苏省</option><option value="浙江省">浙江省</option><option value="安徽省">安徽省</option>
                            <option value="福建省">福建省</option><option value="江西省">江西省</option><option value="山东省">山东省</option>
                            <option value="河南省">河南省</option><option value="湖北省">湖北省</option><option value="湖南省">湖南省</option>
                            <option value="广东省">广东省</option><option value="广西壮族自治区">广西壮族自治区</option><option value="海南省">海南省</option>
                            <option value="重庆市">重庆市</option><option value="四川省">四川省</option><option value="贵州省">贵州省</option>
                            <option value="云南省">云南省</option><option value="陕西省">陕西省</option><option value="甘肃省">甘肃省</option>
                            <option value="青海省">青海省</option><option value="宁夏回族自治区">宁夏回族自治区</option><option value="新疆维吾尔自治区">新疆维吾尔自治区</option>
                            <option value="台湾省">台湾省</option><option value="香港特别行政区">香港特别行政区</option><option value="澳门特别行政区">澳门特别行政区</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>详细救援地址</label>
                        <input type="text" placeholder="街道/门牌/地标" value="贵州省贵阳市花溪区售后中心">
                    </div>
                </div>
                <div style="margin-top: 12px; background:#f9f9fc; border-radius: 12px; padding: 8px 12px; font-size:0.75rem; color:#4b5563;">
                    📌 地图参考：已支持全国省份快捷选择，精确地址请填写详细字段
                </div>
            </div>
        </div>

        <!-- 分配售后点 & 设备处理 -->
        <div class="card">
            <div class="card-header">
                <h2>🏢 服务方案</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-field">
                        <label>分配售后点</label>
                        <select>
                            <option value="贵阳旗舰售后中心">贵阳旗舰售后中心</option>
                            <option value="遵义新能源服务站">遵义新能源服务站</option>
                            <option value="六盘水特约维修点">六盘水特约维修点</option>
                            <option value="毕节移动售后组">毕节移动售后组</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>设备处理</label>
                        <div class="radio-group">
                            <label><input type="radio" name="deviceHandle" value="二次销售"> 二次销售</label>
                            <label><input type="radio" name="deviceHandle" value="返厂" checked> 返厂</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图片视频上传区域 -->
        <div class="card">
            <div class="card-header">
                <h2>📎 凭证附件</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label>选择车牌照片</label>
                        <div class="upload-area" id="plateUploadArea">
                            <div class="upload-btn">+ 拍摄/上传车牌照片</div>
                            <input type="file" id="plateFileInput" accept="image/*" style="display: none;" multiple>
                            <div class="file-list" id="plateFileList">未上传任何照片</div>
                        </div>
                    </div>
                    <div class="form-field full-width">
                        <label>故障表现视频</label>
                        <div class="upload-area" id="videoUploadArea">
                            <div class="upload-btn">+ 上传故障视频</div>
                            <input type="file" id="videoFileInput" accept="video/*" style="display: none;" multiple>
                            <div class="file-list" id="videoFileList">未上传视频</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button type="reset" class="btn-secondary" style="background:#fff; border:1px solid #cbd5e1;">重置</button>
            <button type="button" id="submitBtn">提交售后单</button>
        </div>
    </form>
</div>

<script>
    (function() {
        // DOM 元素
        const isComplexCheckbox = document.getElementById('isComplexInstallCheckbox');
        const complexContainer = document.getElementById('complexTypeContainer');
        const complexSelect = document.getElementById('complexTypeSelect');
        const addComplexBtn = document.getElementById('addComplexTypeBtn');
        
        // 控制复杂类型下拉显隐
        function toggleComplexField() {
            if (isComplexCheckbox.checked) {
                complexContainer.style.display = 'block';
                // 添加required视觉提示 (前端校验)
                complexSelect.setAttribute('required', 'required');
            } else {
                complexContainer.style.display = 'none';
                complexSelect.removeAttribute('required');
                // 可选: 清除选中状态
                // complexSelect.value = "";
            }
        }
        
        isComplexCheckbox.addEventListener('change', toggleComplexField);
        // 初始隐藏
        toggleComplexField();
        
        // 动态新增复杂类型 (支持后续配置项动态新建)
        function addNewComplexType() {
            let newType = prompt("请输入新的复杂类型名称 (例如：吊装施工、地下走线等)", "");
            if (newType && newType.trim() !== "") {
                newType = newType.trim();
                // 检查是否已存在相同的类型 (去重提示)
                let options = complexSelect.options;
                let exists = false;
                for (let i = 0; i < options.length; i++) {
                    if (options[i].value === newType || options[i].text === newType) {
                        exists = true;
                        break;
                    }
                }
                if (exists) {
                    alert("复杂类型「" + newType + "」已存在，不可重复添加");
                    return;
                }
                // 创建新的option
                const newOption = document.createElement('option');
                newOption.value = newType;
                newOption.textContent = newType;
                complexSelect.appendChild(newOption);
                // 自动选中新添加的项，提升体验
                newOption.selected = true;
                // 提示成功
                alert(`✅ 已成功添加复杂类型："${newType}"，现可选择`);
                // 如果当前复杂类型区域是隐藏状态但checkbox未勾选，可以提醒用户勾选（但不强制）
                if (!isComplexCheckbox.checked) {
                    const userConfirm = confirm("当前“是否安装复杂”未勾选，是否要立即勾选以使用新复杂类型？");
                    if (userConfirm) {
                        isComplexCheckbox.checked = true;
                        toggleComplexField();
                    }
                }
            } else if (newType !== null && newType === "") {
                alert("复杂类型名称不能为空");
            }
        }
        
        addComplexBtn.addEventListener('click', addNewComplexType);
        
        // 可选增强：初次加载后确保复杂类型支持动态扩展提示（已完成）
        // 为复杂类型提供一个额外的说明：用户除新建外，还可以通过代码扩展（满足动态配置后续还可新建配置项）
        console.log("复杂类型组件已加载，支持动态新建配置项");
        
        // ----- 图片 / 视频上传逻辑（模拟显示已选文件）-----
        const plateUploadArea = document.getElementById('plateUploadArea');
        const plateInput = document.getElementById('plateFileInput');
        const plateListDiv = document.getElementById('plateFileList');
        const videoUploadArea = document.getElementById('videoUploadArea');
        const videoInput = document.getElementById('videoFileInput');
        const videoListDiv = document.getElementById('videoFileList');
        
        function handleFileSelect(inputElement, listElement, fileTypeLabel) {
            if (inputElement.files.length > 0) {
                const fileNames = Array.from(inputElement.files).map(f => f.name).join(', ');
                listElement.innerText = `已选择 ${inputElement.files.length} 个文件: ${fileNames.substring(0, 60)}${fileNames.length > 60 ? '…' : ''}`;
            } else {
                listElement.innerText = `未上传任何${fileTypeLabel}`;
            }
        }
        
        plateUploadArea.addEventListener('click', () => plateInput.click());
        plateInput.addEventListener('change', () => handleFileSelect(plateInput, plateListDiv, '照片'));
        videoUploadArea.addEventListener('click', () => videoInput.click());
        videoInput.addEventListener('change', () => handleFileSelect(videoInput, videoListDiv, '视频'));
        
        // 重置表单时清空文件显示及复杂类型联动重置（重置按钮行为修正）
        const resetBtn = document.querySelector('button[type="reset"]');
        resetBtn.addEventListener('click', (e) => {
            // 原生reset不能完全重置文件input内容和自定义显示，手动处理
            setTimeout(() => {
                plateInput.value = '';
                videoInput.value = '';
                plateListDiv.innerText = '未上传任何照片';
                videoListDiv.innerText = '未上传任何视频';
                // 复杂类型复选框重置: 默认未勾选，隐藏复杂区域 (由于reset会重置checkbox状态为初始，但初始未勾选？checkbox默认未勾选)
                // 但select的值需要重置为占位默认值 而且复杂类型容器隐藏
                if (!isComplexCheckbox.checked) {
                    complexContainer.style.display = 'none';
                } else {
                    // 如果由于重置导致checkbox状态为true/false，依据实际
                    toggleComplexField();
                }
                // 重置复杂select索引
                complexSelect.selectedIndex = 0;
                // 省份重置
                document.getElementById('provinceSelect').selectedIndex = 0;
            }, 10);
        });
        
        // 提交时校验逻辑 (重点校验复杂类型: 如果勾选了是否安装复杂，必须选择非空且不等于提示选项)
        const submitBtn = document.getElementById('submitBtn');
        
        function validateForm() {
            // 手机号简单校验
            const mobileInput = document.querySelector('input[type="tel"]');
            const mobile = mobileInput.value.trim();
            if (!mobile || mobile.length < 8) {
                alert('请填写正确的手机号');
                mobileInput.focus();
                return false;
            }
            // 是否安装复杂 且 复选框选中时，复杂类型必须已选具体值
            if (isComplexCheckbox.checked) {
                const selectedVal = complexSelect.value;
                if (!selectedVal || selectedVal === "") {
                    alert('已勾选“是否安装复杂”，请选择一个复杂类型（或先点击“新建复杂类型”添加自定义项）');
                    complexSelect.focus();
                    return false;
                }
            }
            // 故障信息非强制，但是可提示用户至少选择一个故障现象？(不做严格限制，但为了数据规范可提醒)
            const faultCheckboxes = document.querySelectorAll('input[type="checkbox"]');
            let hasFaultSelected = false;
            for(let cb of faultCheckboxes) {
                if(cb.checked && cb.closest('.radio-group') && cb.value !== '其他') {
                    hasFaultSelected = true;
                    break;
                }
            }
            if (!hasFaultSelected) {
                // 不强求，但警告一下
                if(!confirm('尚未选择任何故障现象，是否继续提交？')) {
                    return false;
                }
            }
            return true;
        }
        
        // 收集表单数据预览（控制台/提示）
        function collectFormData() {
            const formData = {};
            // 基本信息
            formData.phone = document.querySelector('input[type="tel"]').value;
            formData.address = document.querySelector('input[type="text"]').value;
            formData.source = document.querySelector('select').value;
            formData.deviceId = document.querySelector('input[readonly]').value;
            // 是否安装复杂
            formData.isComplexInstall = isComplexCheckbox.checked;
            if (formData.isComplexInstall) {
                formData.complexType = complexSelect.value;
            } else {
                formData.complexType = '无';
            }
            // 故障现象数组
            const faultItems = [];
            document.querySelectorAll('.radio-group input[type="checkbox"]:checked').forEach(cb => {
                faultItems.push(cb.value);
            });
            formData.faultPhenomenon = faultItems;
            formData.faultDesc = document.querySelector('textarea').value;
            // 救援地点
            formData.province = document.getElementById('provinceSelect').value;
            formData.detailAddress = document.querySelector('input[placeholder*="详细救援地址"]').value;
            // 售后点
            formData.servicePoint = document.querySelector('select:not(#provinceSelect):not(#complexTypeSelect)')?.value;
            const deviceHandleRadio = document.querySelector('input[name="deviceHandle"]:checked');
            formData.deviceHandle = deviceHandleRadio ? deviceHandleRadio.value : '';
            // 附件简单提示
            const plateFiles = plateInput.files.length;
            const videoFiles = videoInput.files.length;
            formData.hasPlatePhotos = plateFiles > 0;
            formData.hasVideos = videoFiles > 0;
            return formData;
        }
        
        submitBtn.addEventListener('click', () => {
            if (validateForm()) {
                const data = collectFormData();
                console.log('提交的售后单数据:', data);
                let complexMsg = `安装复杂: ${data.isComplexInstall ? '是' : '否'}`;
                if(data.isComplexInstall) complexMsg += `, 复杂类型: ${data.complexType}`;
                alert(`✅ 售后单已提交(演示模式)\n\n${complexMsg}\n故障现象: ${data.faultPhenomenon.join(', ') || '无'}\n救援地: ${data.province} ${data.detailAddress}\n售后点: ${data.servicePoint}\n设备处理: ${data.deviceHandle}\n\n完整数据已输出至控制台。`);
                // 此处可加入实际API调用
            } else {
                // 校验失败时已有具体提示
            }
        });
        
        // 附加说明: 复杂类型下拉动态配置功能完全支持。除了使用"新建复杂类型"，用户未来也可以扩展其他后端配置
        // 满足需求: “复杂类型下拉(动态配置后续还可新建配置项的)”
        // 并且可以持续新增任意项，支持新增配置后立即选用。
    })();
</script>
</body>
</html>
